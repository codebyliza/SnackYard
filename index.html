<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snack Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="logo-box">
            <img src="logo.png" alt="Snack Store Logo" class="logo" height="250" width="250">
            <h1><span class="brand-name">SNACKATTACK</span></h1>
        </div>
    </header>
    <main class="main-content">
        <div class="product-row">
            <img src="Snack 1.jpg" alt="Chips" class="product-image"  height="150" width="150">
            <div class="product-info">
                <h2 class="product-title">Spicy Masala Chips</h2>
                <p class="product-flavor">Flavour: Tangy & Chilli</p>
                <span class="product-price">100 Rs.</span>
                <button class="add-to-cart-button">Add to Cart</button>
            </div>
        </div>
        <div class="product-row">
            <img src="Snack 2.jpg" alt="Kurkure" class="product-image"  height="150" width="150">
            <div class="product-info">
                <h2 class="product-title">Chatpta Twist</h2>
                <p class="product-flavor">Flavour: Sour & Spicy</p>
                <span class="product-price">50 Rs.</span>
                <button class="add-to-cart-button">Add to Cart</button>
            </div>
        </div>
        <div class="product-row">
            <img src="Snack 3.jpg" alt="Popcorn" class="product-image"  height="150" width="150">
            <div class="product-info">
                <h2 class="product-title">Cheese Popcorn</h2>
                <p class="product-flavor">Flavour: White Cheddar</p>
                <span class="product-price">80 Rs.</span>
                <button class="add-to-cart-button">Add to Cart</button>
            </div>
        </div>
        <div class="product-row">
            <img src="Snack 4.jpg" alt="Peanuts" class="product-image"  height="150" width="150">
            <div class="product-info">
                <h2 class="product-title">Salted Peanuts</h2>
                <p class="product-flavor">Flavour: Classic Salted</p>
                <span class="product-price">60 Rs.</span>
                <button class="add-to-cart-button">Add to Cart</button>
            </div>
        </div>
        <div class="product-row">
            <img src="Snack 5.jpg" alt="Biscuit" class="product-image"  height="150" width="150">
            <div class="product-info">
                <h2 class="product-title">Chocolate Cookies</h2>
                <p class="product-flavor">Flavour: Sweet Choco</p>
                <span class="product-price">120 Rs.</span>
                <button class="add-to-cart-button">Add to Cart</button>
            </div>
        </div>
    </main>
    <footer class="footer">
        <p>&copy; 2026 SnackYard. All rights reserved.</p>
    </footer>
</body>
</html>
